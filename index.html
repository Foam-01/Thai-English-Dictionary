<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>พจนานุกรม</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: #fffafa;
        overflow-x: hidden;
      }
      #app {
        min-height: 100vh;
        background: linear-gradient(135deg, #fff5f8 0%, #ffeef5 100%);
        position: relative;
      }
      canvas#sakura {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 999;
        width: 100%;
        height: 100%;
      }
      header {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        padding: 14px 20px;
        border-bottom: 1px solid #f5c6dd;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      header h1 {
        font-size: 16px;
        font-weight: 600;
        color: #b5476e;
      }
      nav {
        display: flex;
        gap: 8px;
      }
      nav button {
        padding: 7px 16px;
        border-radius: 20px;
        border: 1px solid #f0a0c0;
        background: white;
        color: #b5476e;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: 0.2s;
      }
      nav button:hover {
        background: #fff0f5;
      }
      nav button.active {
        background: #e8638c;
        color: white;
        border-color: #e8638c;
      }
      main {
        padding: 20px;
        max-width: 960px;
        margin: 0 auto;
      }
      .search-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .count-badge {
        background: #fde8f0;
        color: #b5476e;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 12px;
        white-space: nowrap;
        font-weight: 500;
      }
      input[type="text"] {
        flex: 1;
        padding: 9px 16px;
        border-radius: 20px;
        border: 1px solid #f0c0d4;
        font-size: 14px;
        outline: none;
        background: white;
        font-family: inherit;
      }
      input[type="text"]:focus {
        border-color: #e8638c;
      }
      .table-wrap {
        max-height: calc(100vh - 180px);
        overflow-y: auto;
        border-radius: 12px;
        border: 1px solid #f5d0e4;
        background: rgba(255, 255, 255, 0.95);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead th {
        background: #fde8f0;
        color: #b5476e;
        padding: 10px 12px;
        text-align: left;
        position: sticky;
        top: 0;
        font-weight: 600;
        z-index: 1;
      }
      tbody tr:hover {
        background: #fff5f9;
      }
      tbody td {
        padding: 9px 12px;
        border-bottom: 1px solid #fde8f0;
      }
      .speak-btn {
        background: none;
        border: 1px solid #f0c0d4;
        border-radius: 8px;
        padding: 3px 8px;
        cursor: pointer;
        font-size: 14px;
        color: #b5476e;
        transition: 0.2s;
      }
      .speak-btn:hover {
        background: #fde8f0;
      }
      /* Game */
      #game-view {
        text-align: center;
        padding-top: 20px;
      }
      .game-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        border: 1px solid #f5d0e4;
        padding: 30px;
        max-width: 520px;
        margin: 0 auto;
        box-shadow: 0 8px 30px rgba(232, 99, 140, 0.1);
      }
      .score-row {
        display: flex;
        justify-content: center;
        gap: 32px;
        margin-bottom: 20px;
      }
      .score-box {
        text-align: center;
      }
      .score-num {
        font-size: 28px;
        font-weight: 700;
        color: #c23e70;
        display: block;
      }
      .score-label {
        font-size: 12px;
        color: #b09;
      }
      .question-label {
        color: #b5476e;
        font-size: 13px;
        margin-bottom: 8px;
      }
      .word-en {
        font-size: 2.6rem;
        font-weight: 700;
        color: #c23e70;
        letter-spacing: 1px;
        margin: 8px 0 4px;
      }
      .word-read {
        font-size: 13px;
        color: #b09;
        margin-bottom: 16px;
      }
      .options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin: 16px 0;
      }
      .opt {
        padding: 14px 8px;
        border-radius: 14px;
        border: 1.5px solid #f0c0d4;
        background: white;
        cursor: pointer;
        font-size: 14px;
        color: #333;
        transition: 0.2s;
        font-family: inherit;
        line-height: 1.3;
      }
      .opt:hover:not(:disabled) {
        background: #fde8f0;
        border-color: #e8638c;
        transform: translateY(-1px);
      }
      .opt:disabled {
        cursor: not-allowed;
      }
      .opt.correct {
        background: #d4edda;
        border-color: #5cb85c;
        color: #1a5c2a;
        font-weight: 600;
      }
      .opt.wrong {
        background: #fde8ea;
        border-color: #e05c5c;
        color: #7a1a1a;
      }
      .feedback {
        min-height: 36px;
        margin: 8px 0;
        font-size: 15px;
        font-weight: 600;
        padding: 6px;
      }
      .feedback.ok {
        color: #2a7a2a;
      }
      .feedback.no {
        color: #c0392b;
      }
      .next-btn {
        background: #e8638c;
        color: white;
        border: none;
        border-radius: 20px;
        padding: 11px 30px;
        font-size: 14px;
        cursor: pointer;
        font-family: inherit;
        margin-top: 4px;
        font-weight: 600;
        transition: 0.2s;
      }
      .next-btn:hover {
        background: #c23e70;
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="sakura"></canvas>

      <header>
        <h1>🌸 พจนานุกรม</h1>
        <nav>
          <button class="active" id="btn-dict" onclick="showDict()">
            📖 พจนานุกรม
          </button>
          <button id="btn-game" onclick="showGame()">🎮 เกมทายคำ</button>
        </nav>
      </header>

      <main>
        <div id="dict-view">
          <div class="search-row">
            <span class="count-badge" id="count-badge">🔢 1,000 คำ</span>
            <input
              type="text"
              id="search"
              placeholder="🔍 ค้นหา (ไทย / อังกฤษ)..."
              oninput="filterWords()"
            />
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>English</th>
                  <th>คำอ่าน</th>
                  <th>ความหมาย</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="vocab-body"></tbody>
            </table>
          </div>
        </div>

        <div id="game-view" style="display: none">
          <div class="game-card">
            <div class="score-row">
              <div class="score-box">
                <span class="score-num" id="score-correct">0</span
                ><span class="score-label">ถูก</span>
              </div>
              <div class="score-box">
                <span class="score-num" id="score-total">0</span
                ><span class="score-label">ทั้งหมด</span>
              </div>
            </div>
            <p class="question-label">คำนี้แปลว่าอะไร?</p>
            <div class="word-en" id="q-word">—</div>
            <div class="word-read" id="q-read"></div>
            <div class="options" id="options"></div>
            <div class="feedback" id="feedback"></div>
            <button
              class="next-btn"
              id="next-btn"
              onclick="nextQ()"
              style="display: none"
            >
              คำถัดไป 🌸
            </button>
          </div>
        </div>
      </main>
    </div>

      let filtered = [...words];

      function renderTable(data) {
        const tbody = document.getElementById("vocab-body");
        tbody.innerHTML = data
          .map(
            (w) => `<tr>
        <td><b>${w.en}</b></td>
        <td style="color:#9966aa">${w.read}</td>
        <td>${w.th}</td>
        <td><button class="speak-btn" onclick="speak('${w.en.replace(/'/g, "\\'")}')" title="ฟังเสียง">🔊</button></td>
      </tr>`,
          )
          .join("");
        document.getElementById("count-badge").innerHTML =
          `🔢 ${data.length.toLocaleString()} คำ`;
      }

      function filterWords() {
        const v = document.getElementById("search").value.toLowerCase();
        filtered = v
          ? words.filter(
              (w) => w.en.toLowerCase().includes(v) || w.th.includes(v),
            )
          : words;
        renderTable(filtered);
      }

      function speak(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = "en-US";
        speechSynthesis.speak(u);
      }

      function showDict() {
        document.getElementById("dict-view").style.display = "";
        document.getElementById("game-view").style.display = "none";
        document.getElementById("btn-dict").classList.add("active");
        document.getElementById("btn-game").classList.remove("active");
      }

      function showGame() {
        document.getElementById("dict-view").style.display = "none";
        document.getElementById("game-view").style.display = "";
        document.getElementById("btn-game").classList.add("active");
        document.getElementById("btn-dict").classList.remove("active");
        nextQ();
      }

      let cur = {},
        sc = 0,
        tot = 0;

      function nextQ() {
        document.getElementById("feedback").textContent = "";
        document.getElementById("feedback").className = "feedback";
        document.getElementById("next-btn").style.display = "none";
        cur = words[Math.floor(Math.random() * words.length)];
        document.getElementById("q-word").textContent = cur.en;
        document.getElementById("q-read").textContent = cur.read;
        let opts = [cur.th];
        while (opts.length < 4) {
          let r = words[Math.floor(Math.random() * words.length)].th;
          if (!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);
        document.getElementById("options").innerHTML = opts
          .map(
            (o) => `
        <button class="opt" onclick="check(this,'${o.replace(/'/g, "&#39;").replace(/"/g, "&quot;")}')">${o}</button>
      `,
          )
          .join("");
      }

      function check(btn, choice) {
        document.querySelectorAll(".opt").forEach((b) => (b.disabled = true));
        tot++;
        const fb = document.getElementById("feedback");
        if (choice === cur.th) {
          btn.classList.add("correct");
          sc++;
          fb.textContent = "ถูกต้อง! เก่งมากค่ะ 🌸";
          fb.className = "feedback ok";
        } else {
          btn.classList.add("wrong");
          document.querySelectorAll(".opt").forEach((b) => {
            if (b.textContent.trim() === cur.th) b.classList.add("correct");
          });
          fb.textContent = 'ผิดค่ะ! คำตอบที่ถูกคือ: "' + cur.th + '"';
          fb.className = "feedback no";
        }
        document.getElementById("score-correct").textContent = sc;
        document.getElementById("score-total").textContent = tot;
        document.getElementById("next-btn").style.display = "inline-block";
      }

      // Sakura canvas
      (function () {
        const canvas = document.getElementById("sakura");
        const ctx = canvas.getContext("2d");
        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);
        const petals = Array.from({ length: 60 }, () => ({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          size: Math.random() * 6 + 3,
          speed: Math.random() * 1.2 + 0.4,
          angle: Math.random() * 360,
          drift: Math.random() * 0.8 - 0.4,
          opacity: Math.random() * 0.45 + 0.25,
        }));
        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          petals.forEach((p) => {
            ctx.save();
            ctx.globalAlpha = p.opacity;
            ctx.translate(p.x, p.y);
            ctx.rotate((p.angle * Math.PI) / 180);
            ctx.beginPath();
            ctx.moveTo(0, -p.size);
            ctx.bezierCurveTo(
              p.size,
              -p.size * 0.5,
              p.size,
              p.size * 0.5,
              0,
              p.size,
            );
            ctx.bezierCurveTo(
              -p.size,
              p.size * 0.5,
              -p.size,
              -p.size * 0.5,
              0,
              -p.size,
            );
            ctx.fillStyle = "#ffb7c5";
            ctx.fill();
            ctx.restore();
            p.y += p.speed;
            p.x += Math.sin(p.y / 40) * p.drift;
            p.angle += 0.8;
            if (p.y > canvas.height + 20) p.y = -10;
          });
          requestAnimationFrame(draw);
        }
        draw();
      })();

      renderTable(words);
    </script>
